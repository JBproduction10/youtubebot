<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YouTubeBot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --border:   #1e1e2e;
    --accent:   #ff3c3c;
    --accent2:  #ff8c00;
    --green:    #00e676;
    --cyan:     #00e5ff;
    --muted:    #44445a;
    --text:     #e0e0f0;
    --text-dim: #7070a0;
    --font-mono: 'Share Tech Mono', monospace;
    --font-ui:   'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 1000; pointer-events: none;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
    );
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,60,60,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,60,60,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ── Layout ────────────────────────────────── */
  .shell {
    position: relative; z-index: 1;
    max-width: 1300px; margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* ── Header ─────────────────────────────────── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .logo {
    display: flex; align-items: center; gap: 14px;
  }
  .logo-icon {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 20px;
    box-shadow: 0 0 24px rgba(255,60,60,0.5);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 24px rgba(255,60,60,0.5); }
    50%      { box-shadow: 0 0 40px rgba(255,60,60,0.9); }
  }
  .logo-text {
    font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--accent); }
  .status-pill {
    font-family: var(--font-mono); font-size: 12px;
    padding: 5px 14px; border-radius: 99px;
    border: 1px solid var(--muted); color: var(--text-dim);
    transition: all 0.3s;
    display: flex; align-items: center; gap: 7px;
  }
  .status-pill.running { border-color: var(--green); color: var(--green); }
  .status-pill.paused  { border-color: var(--accent2); color: var(--accent2); }
  .status-pill .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: currentColor;
  }
  .status-pill.running .dot { animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Main grid ───────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    grid-template-rows: auto auto;
    gap: 18px;
  }
  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* ── Card ────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.3;
  }
  .card-title {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
  }
  .card-title::before {
    content: '';
    display: inline-block; width: 3px; height: 14px;
    background: var(--accent); border-radius: 2px;
  }

  /* ── Stats row ───────────────────────────────── */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
    margin-bottom: 18px;
  }
  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    transition: border-color 0.2s;
  }
  .stat-box:hover { border-color: var(--muted); }
  .stat-label {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--text-dim); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--font-mono); font-size: 26px;
    font-weight: 400; line-height: 1;
    color: var(--cyan);
  }
  .stat-value.accent  { color: var(--accent); }
  .stat-value.green   { color: var(--green); }
  .stat-value.orange  { color: var(--accent2); }

  /* ── Progress ────────────────────────────────── */
  .progress-section { margin-bottom: 18px; }
  .progress-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .progress-label { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); }
  .progress-pct { font-size: 13px; font-family: var(--font-mono); color: var(--cyan); }
  .track {
    height: 6px; background: var(--border); border-radius: 99px;
    overflow: hidden;
  }
  .fill {
    height: 100%; border-radius: 99px; width: 0%;
    transition: width 0.5s ease;
  }
  .fill-video { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .fill-loop  { background: linear-gradient(90deg, var(--cyan), var(--green)); }
  .current-url {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--text-dim); margin-top: 10px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 100%;
  }
  .current-url a { color: var(--cyan); text-decoration: none; }
  .current-url a:hover { text-decoration: underline; }

  /* ── Controls ────────────────────────────────── */
  .controls { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    font-family: var(--font-ui); font-weight: 700; font-size: 13px;
    letter-spacing: 0.5px;
    padding: 10px 22px; border-radius: 8px; border: none;
    cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-start {
    background: var(--accent); color: #fff;
    box-shadow: 0 0 20px rgba(255,60,60,0.3);
  }
  .btn-start:hover { box-shadow: 0 0 30px rgba(255,60,60,0.6); }
  .btn-stop {
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn-stop:hover { background: rgba(255,60,60,0.1); }
  .btn-pause {
    background: transparent; color: var(--accent2);
    border: 1px solid var(--accent2);
  }
  .btn-pause:hover { background: rgba(255,140,0,0.1); }
  .btn-skip {
    background: transparent; color: var(--cyan);
    border: 1px solid var(--cyan);
  }
  .btn-skip:hover { background: rgba(0,229,255,0.1); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Log ─────────────────────────────────────── */
  .log-panel {
    grid-column: 1 / -1;
  }
  .log-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    height: 220px; overflow-y: auto;
    padding: 12px 14px;
    font-family: var(--font-mono); font-size: 12px;
    line-height: 1.7;
    scroll-behavior: smooth;
  }
  .log-box::-webkit-scrollbar { width: 4px; }
  .log-box::-webkit-scrollbar-track { background: transparent; }
  .log-box::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 99px; }
  .log-entry { display: flex; gap: 10px; }
  .log-time { color: var(--muted); flex-shrink: 0; }
  .log-msg  { color: var(--text); }
  .log-msg.success { color: var(--green); }
  .log-msg.error   { color: var(--accent); }
  .log-msg.warn    { color: var(--accent2); }

  /* ── Config panel ────────────────────────────── */
  .config-panel { grid-row: 1 / 3; }

  .form-group { margin-bottom: 16px; }
  label {
    display: block; font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 7px;
  }
  input[type="text"], input[type="number"], textarea {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-family: var(--font-mono); font-size: 12px;
    padding: 9px 12px; outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, input[type="number"]:focus, textarea:focus {
    border-color: var(--accent);
  }
  textarea { height: 120px; resize: vertical; line-height: 1.6; }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-label { font-size: 13px; color: var(--text); }
  .toggle {
    width: 42px; height: 22px; border-radius: 11px;
    background: var(--muted); border: none; cursor: pointer;
    position: relative; transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute; top: 3px; left: 3px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; transition: transform 0.2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { transform: translateX(20px); }

  .range-row { display: flex; align-items: center; gap: 10px; }
  input[type="range"] {
    flex: 1; accent-color: var(--accent);
  }
  .range-val {
    font-family: var(--font-mono); font-size: 13px;
    color: var(--cyan); min-width: 40px; text-align: right;
  }

  .btn-save {
    width: 100%; margin-top: 18px;
    background: transparent; color: var(--green);
    border: 1px solid var(--green);
    justify-content: center;
  }
  .btn-save:hover { background: rgba(0,230,118,0.08); }

  /* ── Responsive ──────────────────────────────── */
  @media (max-width: 700px) {
    .stats-row { grid-template-columns: repeat(2,1fr); }
    .config-panel { grid-row: auto; }
  }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">
      <div class="logo-icon">▶</div>
      <div class="logo-text">YouTube<span>Bot</span></div>
    </div>
    <div id="statusPill" class="status-pill">
      <div class="dot"></div>
      <span id="statusText">IDLE</span>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-label">Videos Played</div>
      <div class="stat-value green" id="statPlayed">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Ads Skipped</div>
      <div class="stat-value accent" id="statAds">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Current Loop</div>
      <div class="stat-value" id="statLoop">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Video In Loop</div>
      <div class="stat-value orange" id="statIndex">—</div>
    </div>
  </div>

  <div class="grid">

    <!-- Left column -->
    <div>
      <div class="card" style="margin-bottom:18px">
        <div class="card-title">Playback Progress</div>

        <div class="progress-section">
          <div class="progress-header">
            <span class="progress-label">Current video</span>
            <span class="progress-pct" id="vidPct">0%</span>
          </div>
          <div class="track"><div class="fill fill-video" id="vidBar"></div></div>
          <div class="current-url" id="currentUrl">No video playing</div>
        </div>

        <div class="progress-section">
          <div class="progress-header">
            <span class="progress-label">Loop progress</span>
            <span class="progress-pct" id="loopPct">0%</span>
          </div>
          <div class="track"><div class="fill fill-loop" id="loopBar"></div></div>
        </div>

        <div class="controls" style="margin-top:20px">
          <button class="btn btn-start" id="btnStart" onclick="botStart()">▶ Start</button>
          <button class="btn btn-pause" id="btnPause" onclick="botPause()" disabled>⏸ Pause</button>
          <button class="btn btn-skip"  id="btnSkip"  onclick="botSkip()"  disabled>⏭ Skip</button>
          <button class="btn btn-stop"  id="btnStop"  onclick="botStop()"  disabled>■ Stop</button>
        </div>
      </div>

      <div class="card log-panel">
        <div class="card-title">Live Log</div>
        <div class="log-box" id="logBox">
          <div class="log-entry">
            <span class="log-time">--:--:--</span>
            <span class="log-msg" style="color:var(--text-dim)">Waiting for bot to start...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right column: Config -->
    <div class="card config-panel">
      <div class="card-title">Configuration</div>

      <div class="form-group">
        <label>Video URLs (one per line)</label>
        <textarea id="cfgVideos" placeholder="https://www.youtube.com/watch?v=..."></textarea>
      </div>

      <div class="form-group">
        <label>Loops (0 = infinite)</label>
        <input type="number" id="cfgLoops" value="0" min="0"/>
      </div>

      <div class="form-group">
        <label>Watch ratio: <span id="ratioLabel">100%</span></label>
        <div class="range-row">
          <input type="range" id="cfgRatio" min="10" max="100" value="100"
                 oninput="document.getElementById('ratioLabel').textContent=this.value+'%'"/>
        </div>
      </div>

      <div class="form-group">
        <label>Delay between videos (seconds)</label>
        <div style="display:flex;gap:10px">
          <input type="number" id="cfgDelayMin" value="3" min="0" style="width:50%" placeholder="Min"/>
          <input type="number" id="cfgDelayMax" value="10" min="0" style="width:50%" placeholder="Max"/>
        </div>
      </div>

      <div>
        <div class="toggle-row">
          <span class="toggle-label">🔀 Shuffle order</span>
          <button class="toggle on" id="togShuffle" onclick="toggleBtn(this)"></button>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">👻 Headless mode</span>
          <button class="toggle" id="togHeadless" onclick="toggleBtn(this)"></button>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">🔇 Mute audio</span>
          <button class="toggle" id="togMute" onclick="toggleBtn(this)"></button>
        </div>
      </div>

      <button class="btn btn-save" onclick="saveConfig()">💾  Save Config</button>
    </div>

  </div>
</div>

<script>
// ── SSE ────────────────────────────────────────────────────────────────────────
const evtSrc = new EventSource('/stream');

evtSrc.addEventListener('state', e => {
  applyState(JSON.parse(e.data));
});
evtSrc.addEventListener('log', e => {
  const {time, msg, level} = JSON.parse(e.data);
  appendLog(time, msg, level);
});

// ── State renderer ─────────────────────────────────────────────────────────────
function applyState(s) {
  // Stats
  document.getElementById('statPlayed').textContent = s.videos_played;
  document.getElementById('statAds').textContent    = s.ads_skipped;
  document.getElementById('statLoop').textContent   =
    s.loop_total === 0
      ? (s.loop_current ? `${s.loop_current} / ∞` : '—')
      : (s.loop_current ? `${s.loop_current} / ${s.loop_total}` : '—');
  document.getElementById('statIndex').textContent  =
    s.current_index && s.total_videos
      ? `${s.current_index} / ${s.total_videos}` : '—';

  // Video progress bar
  const pct = s.duration > 0 ? Math.min(100, Math.round(s.elapsed / s.duration * 100)) : 0;
  document.getElementById('vidPct').textContent = pct + '%';
  document.getElementById('vidBar').style.width = pct + '%';

  // Loop bar
  const lPct = s.total_videos > 0
    ? Math.round((s.current_index - 1) / s.total_videos * 100) : 0;
  document.getElementById('loopPct').textContent = lPct + '%';
  document.getElementById('loopBar').style.width = lPct + '%';

  // Current URL
  const urlEl = document.getElementById('currentUrl');
  if (s.current_url) {
    urlEl.innerHTML = `▶ <a href="${s.current_url}" target="_blank">${s.current_url}</a>`;
  } else {
    urlEl.textContent = 'No video playing';
  }

  // Status pill
  const pill = document.getElementById('statusPill');
  const txt  = document.getElementById('statusText');
  pill.className = 'status-pill';
  if (s.running && s.paused) {
    pill.classList.add('paused');
    txt.textContent = 'PAUSED';
  } else if (s.running) {
    pill.classList.add('running');
    txt.textContent = 'RUNNING';
  } else {
    txt.textContent = 'IDLE';
  }

  // Buttons
  document.getElementById('btnStart').disabled = s.running;
  document.getElementById('btnPause').disabled = !s.running;
  document.getElementById('btnSkip').disabled  = !s.running;
  document.getElementById('btnStop').disabled  = !s.running;
  document.getElementById('btnPause').textContent = s.paused ? '▶ Resume' : '⏸ Pause';
}

// ── Log ────────────────────────────────────────────────────────────────────────
function appendLog(time, msg, level='info') {
  const box = document.getElementById('logBox');
  const el  = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML =
    `<span class="log-time">${time}</span>` +
    `<span class="log-msg ${level}">${escHtml(msg)}</span>`;
  box.appendChild(el);
  // Trim old entries
  while (box.children.length > 150) box.removeChild(box.firstChild);
  box.scrollTop = box.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── API calls ──────────────────────────────────────────────────────────────────
async function api(path, method='POST', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

async function botStart()  { await api('/api/start'); }
async function botStop()   { await api('/api/stop'); }
async function botPause()  { await api('/api/pause'); }
async function botSkip()   { await api('/api/skip'); }

async function saveConfig() {
  const videos = document.getElementById('cfgVideos').value
    .split('\n').map(v=>v.trim()).filter(Boolean);
  const body = {
    videos,
    loops:      parseInt(document.getElementById('cfgLoops').value) || 0,
    watch_ratio: parseInt(document.getElementById('cfgRatio').value) / 100,
    delay_min:  parseFloat(document.getElementById('cfgDelayMin').value) || 3,
    delay_max:  parseFloat(document.getElementById('cfgDelayMax').value) || 10,
    shuffle:    document.getElementById('togShuffle').classList.contains('on'),
    headless:   document.getElementById('togHeadless').classList.contains('on'),
    mute:       document.getElementById('togMute').classList.contains('on'),
  };
  const res = await api('/api/config', 'POST', body);
  appendLog(new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),
            res.ok ? '💾 Config saved' : 'Save failed', res.ok ? 'success' : 'error');
}

function toggleBtn(el) {
  el.classList.toggle('on');
}

// ── Init: load config ──────────────────────────────────────────────────────────
(async () => {
  const cfg = await api('/api/config', 'GET');
  document.getElementById('cfgVideos').value = (cfg.videos || []).join('\n');
  document.getElementById('cfgLoops').value  = cfg.loops ?? 0;
  document.getElementById('cfgRatio').value  = Math.round((cfg.watch_ratio ?? 1) * 100);
  document.getElementById('ratioLabel').textContent = Math.round((cfg.watch_ratio ?? 1)*100)+'%';
  document.getElementById('cfgDelayMin').value = cfg.delay_min ?? 3;
  document.getElementById('cfgDelayMax').value = cfg.delay_max ?? 10;
  if (!cfg.shuffle)  document.getElementById('togShuffle').classList.remove('on');
  if (cfg.headless)  document.getElementById('togHeadless').classList.add('on');
  if (cfg.mute)      document.getElementById('togMute').classList.add('on');
})();
</script>
</body>
</html>
