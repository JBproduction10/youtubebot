# fly.toml — YouTubeBot Fly.io config
# Replace "youtubebot" with your actual app name from `fly launch`

app = "youtubebot"
primary_region = "jnb"  # Johannesburg — closest to Cape Town

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1